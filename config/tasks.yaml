analisis_de_seguridad:
  description: >
    Analiza el siguiente código en busca de vulnerabilidades de seguridad:

    ```
    {code}
    ```

    Céntrate en:
    - Vulnerabilidades de inyección (SQL, comandos, LDAP, etc.)
    - Autenticación o gestión de sesiones defectuosas
    - Exposición de datos sensibles (secretos en el código, almacenamiento sin cifrar)
    - Deserialización insegura
    - Uso de componentes con vulnerabilidades conocidas
    - Falta de validación o saneamiento de entradas
    - Referencias directas a objetos inseguras
    - Mala configuración de seguridad

    Por cada problema encontrado, proporciona:
    1. La línea exacta o fragmento de código afectado
    2. Una descripción de la vulnerabilidad
    3. Su severidad (CRÍTICA / ALTA / MEDIA / BAJA)
    4. Una corrección concreta con el código corregido
  expected_output: >
    Una lista estructurada de problemas de seguridad encontrados en el código.
    Cada problema debe incluir: el fragmento afectado, tipo de vulnerabilidad,
    nivel de severidad y una corrección concreta.
    Si no se encuentran problemas, indicar explícitamente "No se detectaron vulnerabilidades de seguridad."
  agent: analizador

tarea_optimizacion:
  description: >
    Analiza el siguiente código en busca de problemas de rendimiento:

    ```
    {code}
    ```

    Céntrate en:
    - Complejidad algorítmica (bucles anidados, iteraciones redundantes)
    - Estructuras de datos ineficientes
    - Llamadas innecesarias a base de datos o APIs dentro de bucles
    - Fugas de memoria o uso excesivo de memoria
    - Operaciones síncronas bloqueantes que deberían ser asíncronas
    - Oportunidades de caché desaprovechadas
    - Cálculos redundantes

    Por cada problema encontrado, proporciona:
    1. La línea exacta o fragmento de código afectado
    2. Una descripción del problema de rendimiento
    3. Su impacto (ALTO / MEDIO / BAJO)
    4. Una versión optimizada del código
  expected_output: >
    Una lista estructurada de problemas de rendimiento encontrados en el código.
    Cada problema debe incluir: el fragmento afectado, descripción del problema,
    nivel de impacto y una corrección optimizada.
    Si no se encuentran problemas, indicar explícitamente "No se detectaron problemas de rendimiento."
  agent: optimizador

buenas_practicas:
  description: >
    Analiza el siguiente código en busca de violaciones de estilo, legibilidad y buenas prácticas:

    ```
    {code}
    ```

    Céntrate en:
    - Convenciones de nomenclatura (variables, funciones, clases)
    - Longitud de funciones y clases (principio de responsabilidad única)
    - Duplicación de código (principio DRY)
    - Documentación o comentarios ausentes o insuficientes
    - Números mágicos o valores hardcodeados que deberían ser constantes
    - Completitud del manejo de errores
    - Complejidad innecesaria o sobre-ingeniería
    - Buenas prácticas específicas del lenguaje

    Por cada problema encontrado, proporciona:
    1. La línea exacta o fragmento de código afectado
    2. Una descripción de la violación de estilo
    3. Su severidad (MAYOR / MENOR / SUGERENCIA)
    4. La versión corregida
  expected_output: >
    Una lista estructurada de problemas de estilo y buenas prácticas.
    Cada problema debe incluir: el fragmento afectado, descripción de la violación,
    severidad y código corregido.
    Si no se encuentran problemas, indicar explícitamente "El código cumple todos los estándares de estilo."
  agent: estilista

resumir:
  description: >
    Has recibido informes de análisis de tres especialistas:
    - Analista de Seguridad
    - Ingeniero de Rendimiento
    - Inspector de Calidad de Código

    Usando todos sus hallazgos, redacta un informe de revisión de código
    completo y bien estructurado para el fichero: {filename}

    El informe debe seguir esta estructura:
    1. **Resumen Ejecutivo** — puntuación de calidad global (0-10) y veredicto breve
    2. **Problemas Críticos** — problemas que DEBEN corregirse antes de hacer merge
    3. **Hallazgos de Seguridad** — todos los problemas de seguridad con prioridades
    4. **Hallazgos de Rendimiento** — todos los problemas de rendimiento con prioridades
    5. **Hallazgos de Estilo y Calidad** — problemas de estilo y sugerencias
    6. **Plan de Acción Recomendado** — lista ordenada de qué corregir primero
    7. **Puntos Positivos** — qué hace bien el código

    Usa formato markdown claro. Sé directo, constructivo y accionable.

    Una vez generado el informe, usa la herramienta "Generador de PDF"
    pasándole la ruta del archivo markdown: reports/review_{filename}.md

  expected_output: >
    Un informe de revisión de código completo y bien formateado en markdown que cubre
    hallazgos de seguridad, rendimiento y estilo. Incluye una puntuación de calidad global,
    problemas priorizados y un plan de acción concreto para el desarrollador.
  agent: documentador
  output_file: reports/review_{filename}.md

generate_pdf_task:
  description: >
    El informe markdown ya ha sido guardado en reports/review_{filename}.md.
    Usa la herramienta "Generador de PDF" para convertirlo a PDF
    pasándole exactamente esa ruta.
  expected_output: >
    Confirmación de que el PDF se ha generado correctamente con su ruta.
  agent: documentador